<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Applications - WorkSetu</title>
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    
    <!-- Navigation Bar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-briefcase text-green-600 text-2xl"></i>
                    <h1 class="text-2xl font-bold text-gray-800">WorkSetu</h1>
                </div>
                
                <a href="employer-dashboard.html" class="text-gray-600 hover:text-green-600">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8">
        
        <!-- Job Info Header -->
        <div class="bg-gradient-to-r from-green-500 to-green-700 rounded-lg shadow-md p-6 text-white mb-6">
            <h1 class="text-3xl font-bold mb-2" id="job-title">Loading...</h1>
            <div class="flex flex-wrap gap-4 text-green-100">
                <span><i class="fas fa-map-marker-alt mr-1"></i><span id="job-location">Loading...</span></span>
                <span><i class="fas fa-rupee-sign mr-1"></i><span id="job-salary">Loading...</span></span>
                <span><i class="fas fa-tools mr-1"></i><span id="job-skill">Loading...</span></span>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow-md p-6 text-center">
                <div class="text-3xl font-bold text-blue-600 mb-2" id="total-applications">0</div>
                <p class="text-gray-600 text-sm">Total Applications</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 text-center">
                <div class="text-3xl font-bold text-yellow-600 mb-2" id="pending-applications">0</div>
                <p class="text-gray-600 text-sm">Pending Review</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 text-center">
                <div class="text-3xl font-bold text-green-600 mb-2" id="accepted-applications">0</div>
                <p class="text-gray-600 text-sm">Accepted</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 text-center">
                <div class="text-3xl font-bold text-red-600 mb-2" id="rejected-applications">0</div>
                <p class="text-gray-600 text-sm">Rejected</p>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <div class="flex flex-wrap gap-2">
                <button onclick="filterApplications('all')" class="filter-btn px-4 py-2 rounded-lg font-medium transition bg-green-600 text-white">
                    All
                </button>
                <button onclick="filterApplications('pending')" class="filter-btn px-4 py-2 rounded-lg font-medium transition bg-gray-200 text-gray-700 hover:bg-gray-300">
                    Pending
                </button>
                <button onclick="filterApplications('accepted')" class="filter-btn px-4 py-2 rounded-lg font-medium transition bg-gray-200 text-gray-700 hover:bg-gray-300">
                    Accepted
                </button>
                <button onclick="filterApplications('rejected')" class="filter-btn px-4 py-2 rounded-lg font-medium transition bg-gray-200 text-gray-700 hover:bg-gray-300">
                    Rejected
                </button>
            </div>
        </div>

        <!-- Applications List -->
        <div id="applications-container" class="space-y-4">
            <!-- Loading state -->
            <div class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-green-600 mb-4"></i>
                <p class="text-gray-600">Loading applications...</p>
            </div>
        </div>

        <!-- No Applications State -->
        <div id="no-applications" class="hidden bg-white rounded-lg shadow-md p-12 text-center">
            <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-800 mb-2">No Applications Yet</h3>
            <p class="text-gray-600 mb-4">Workers haven't applied to this job yet. Share your job to get more applicants!</p>
        </div>
    </div>

    <!-- Worker Profile Modal -->
    <div id="worker-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6" id="worker-modal-content">
                <!-- Worker details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script type="module">
        import { getCurrentUser, getUserData, checkAuthState } from '../js/auth.js';
        import { db, doc, getDoc, collection, query, where, getDocs, orderBy } from '../js/firebase-config.js';
        import { getJobApplications, acceptApplication, rejectApplication } from '../js/applications.js';
        const params = new URLSearchParams(window.location.search);
const jobId = params.get("jobId");
console.log("JOB ID:", jobId);

        let currentJobId = null;
        let allApplications = [];
        let currentFilter = 'all';
        
        checkAuthState(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            const result = await getUserData(user.uid);
            if (result.success) {
                const userData = result.data;
                
                if (userData.userType !== 'employer') {
                    alert('This page is only for employers!');
                    window.location.href = 'worker-dashboard.html';
                    return;
                }
                
                // Get job ID from URL
                const urlParams = new URLSearchParams(window.location.search);
                currentJobId = urlParams.get('jobId');
                
                if (!currentJobId) {
                    alert('No job specified');
                    window.location.href = 'employer-dashboard.html';
                    return;
                }
                
                await loadJobDetails();
                await loadApplications();
            }
        });
        // Handles clicks for dynamically created buttons
document.addEventListener("click", (e) => {
  const btn = e.target.closest(".view-app-btn");
  if (!btn) return;

  const jobId = btn.dataset.id;

  if (!jobId) {
    alert("Job ID missing");
    return;
  }

  // navigate safely
  window.location.href = "view-applications.html?jobId=" + jobId;
});

        
        async function loadJobDetails() {
            try {
                const jobDoc = await getDoc(doc(db, 'jobs', currentJobId));
                
                if (!jobDoc.exists()) {
                    alert('Job not found');
                    window.location.href = 'employer-dashboard.html';
                    return;
                }
                
                const job = jobDoc.data();
                document.getElementById('job-title').textContent = job.title;
                document.getElementById('job-location').textContent = job.location;
                document.getElementById('job-salary').textContent = job.salary;
                document.getElementById('job-skill').textContent = job.skillRequired;
                
            } catch (error) {
                console.error('Error loading job:', error);
            }
        }
        
        async function loadApplications() {
            try {
                const result = await getJobApplications(currentJobId);
                
                if (!result.success) {
                    throw new Error(result.error);
                }
                
                allApplications = result.applications;
                
                if (allApplications.length === 0) {
                    document.getElementById('applications-container').classList.add('hidden');
                    document.getElementById('no-applications').classList.remove('hidden');
                    return;
                }
                
                updateStats();
                displayApplications(allApplications);
                
            } catch (error) {
                console.error('Error loading applications:', error);
                document.getElementById('applications-container').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-6 text-center">
                        <i class="fas fa-exclamation-circle text-red-500 text-3xl mb-3"></i>
                        <p class="text-red-700">Error loading applications. Please refresh the page.</p>
                    </div>
                `;
            }
        }
        
        function updateStats() {
            const total = allApplications.length;
            const pending = allApplications.filter(a => a.status === 'pending').length;
            const accepted = allApplications.filter(a => a.status === 'accepted').length;
            const rejected = allApplications.filter(a => a.status === 'rejected').length;
            
            document.getElementById('total-applications').textContent = total;
            document.getElementById('pending-applications').textContent = pending;
            document.getElementById('accepted-applications').textContent = accepted;
            document.getElementById('rejected-applications').textContent = rejected;
        }
        
        window.filterApplications = function(filter) {
            currentFilter = filter;
            
            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-green-600', 'text-white');
                btn.classList.add('bg-gray-200', 'text-gray-700');
            });
            event.target.classList.remove('bg-gray-200', 'text-gray-700');
            event.target.classList.add('bg-green-600', 'text-white');
            
            // Filter applications
            let filtered = allApplications;
            if (filter !== 'all') {
                filtered = allApplications.filter(a => a.status === filter);
            }
            
            displayApplications(filtered);
        }
        
        function displayApplications(applications) {
            const container = document.getElementById('applications-container');
            
            if (applications.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-lg shadow-md p-12 text-center">
                        <i class="fas fa-filter text-5xl text-gray-300 mb-4"></i>
                        <p class="text-gray-600">No applications found for this filter</p>
                    </div>
                `;
                return;
            }
            
            container.classList.remove('hidden');
            container.innerHTML = applications.map(app => createApplicationCard(app)).join('');
        }
        
        function createApplicationCard(app) {
            const statusColors = {
                pending: 'bg-yellow-100 text-yellow-700 border-yellow-300',
                accepted: 'bg-green-100 text-green-700 border-green-300',
                rejected: 'bg-red-100 text-red-700 border-red-300'
            };
            
            const statusIcons = {
                pending: 'fa-clock',
                accepted: 'fa-check-circle',
                rejected: 'fa-times-circle'
            };
            
            const statusColor = statusColors[app.status] || statusColors.pending;
            const statusIcon = statusIcons[app.status] || statusIcons.pending;
            
            // Calculate match score
            const trustScoreColor = app.workerTrustScore >= 70 ? 'text-green-600' : 
                                   app.workerTrustScore >= 50 ? 'text-yellow-600' : 'text-red-600';
            
            return `
                <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <div class="flex items-center space-x-3 mb-2">
                                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                                    <i class="fas fa-user text-blue-600 text-xl"></i>
                                </div>
                                <div>
                                    <h3 class="text-xl font-semibold text-gray-800">${app.workerName}</h3>
                                    <p class="text-sm text-gray-600">
                                        <i class="fas fa-map-marker-alt mr-1"></i>${app.workerLocation || 'Not specified'}
                                    </p>
                                </div>
                            </div>
                        </div>
                        <span class="${statusColor} px-4 py-2 rounded-full text-sm font-semibold border-2 flex items-center space-x-2">
                            <i class="fas ${statusIcon}"></i>
                            <span>${app.status.charAt(0).toUpperCase() + app.status.slice(1)}</span>
                        </span>
                    </div>
                    
                    <!-- Worker Info -->
                    <div class="grid md:grid-cols-3 gap-4 mb-4">
                        <div class="bg-gray-50 p-3 rounded-lg">
                            <p class="text-xs text-gray-600 mb-1">Trust Score</p>
                            <p class="text-lg font-bold ${trustScoreColor}">
                                ${app.workerTrustScore || 50}/100
                            </p>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-lg">
                            <p class="text-xs text-gray-600 mb-1">Experience</p>
                            <p class="text-sm font-semibold text-gray-800">${app.workerExperience}</p>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-lg">
                            <p class="text-xs text-gray-600 mb-1">Applied</p>
                            <p class="text-sm font-semibold text-gray-800">${new Date(app.appliedAt).toLocaleDateString()}</p>
                        </div>
                    </div>
                    
                    <!-- Skills -->
                    <div class="mb-4">
                        <p class="text-sm font-semibold text-gray-700 mb-2">Skills:</p>
                        <div class="flex flex-wrap gap-2">
                            ${app.workerSkills && app.workerSkills.length > 0 ? 
                                app.workerSkills.map(skill => 
                                    `<span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-medium">${skill}</span>`
                                ).join('') : 
                                '<span class="text-sm text-gray-500">No skills listed</span>'
                            }
                        </div>
                    </div>
                    
                    <!-- Worker's Message -->
                    ${app.message ? `
                    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-4">
                        <p class="text-xs font-semibold text-blue-800 mb-1">Message from worker:</p>
                        <p class="text-sm text-gray-700">${app.message}</p>
                    </div>
                    ` : ''}
                    
                    <!-- Action Buttons -->
                    ${app.status === 'pending' ? `
                    <div class="flex space-x-3">
                        <button 
                            onclick="acceptWorker('${app.id}')"
                            class="flex-1 bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-semibold"
                        >
                            <i class="fas fa-check-circle mr-2"></i>Accept Worker
                        </button>
                        <button 
                            onclick="rejectWorker('${app.id}')"
                            class="flex-1 bg-red-600 text-white py-3 rounded-lg hover:bg-red-700 transition font-semibold"
                        >
                            <i class="fas fa-times-circle mr-2"></i>Reject
                        </button>
                        <button 
                            onclick="viewWorkerProfile('${app.id}')"
                            class="px-6 py-3 border-2 border-gray-300 rounded-lg hover:bg-gray-50 transition"
                        >
                            <i class="fas fa-info-circle"></i>
                        </button>
                    </div>
                    ` : app.status === 'accepted' ? `
                    <div class="bg-green-50 border-2 border-green-200 rounded-lg p-4">
                        <p class="text-green-800 font-semibold mb-2">
                            <i class="fas fa-check-circle mr-2"></i>You accepted this worker
                        </p>
                        <p class="text-sm text-gray-700">Contact: ${app.workerEmail || 'Email not available'}</p>
                        ${app.respondedAt ? `<p class="text-xs text-gray-600 mt-1">Accepted on: ${new Date(app.respondedAt).toLocaleDateString()}</p>` : ''}
                    </div>
                    ` : `
                    <div class="bg-red-50 border-2 border-red-200 rounded-lg p-4">
                        <p class="text-red-800 font-semibold mb-2">
                            <i class="fas fa-times-circle mr-2"></i>Rejected
                        </p>
                        ${app.rejectionReason ? `<p class="text-sm text-gray-700">Reason: ${app.rejectionReason}</p>` : ''}
                        ${app.respondedAt ? `<p class="text-xs text-gray-600 mt-1">Rejected on: ${new Date(app.respondedAt).toLocaleDateString()}</p>` : ''}
                    </div>
                    `}
                </div>
            `;
        }
        
        window.acceptWorker = async function(applicationId) {
            if (!confirm('Accept this worker for the job?')) return;
            
            const result = await acceptApplication(applicationId);
            
            if (result.success) {
                alert('✅ Worker accepted! You can now contact them to proceed with the job.');
                await loadApplications();
            } else {
                alert('❌ Failed to accept application: ' + result.error);
            }
        }
        
        window.rejectWorker = async function(applicationId) {
            const reason = prompt('Optional: Provide a reason for rejection (will be shown to worker):');
            
            if (reason === null) return; // Cancelled
            
            const result = await rejectApplication(applicationId, reason);
            
            if (result.success) {
                alert('Application rejected.');
                await loadApplications();
            } else {
                alert('❌ Failed to reject application: ' + result.error);
            }
        }
        
        window.viewWorkerProfile = function(applicationId) {
            const app = allApplications.find(a => a.id === applicationId);
            if (!app) return;
            
            const modal = document.getElementById('worker-modal');
            const content = document.getElementById('worker-modal-content');
            
            content.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Worker Profile</h2>
                    <button onclick="closeWorkerModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                
                <div class="text-center mb-6">
                    <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-user text-blue-600 text-4xl"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-800">${app.workerName}</h3>
                    <p class="text-gray-600">${app.workerLocation || 'Location not specified'}</p>
                </div>
                
                <div class="grid md:grid-cols-2 gap-4 mb-6">
                    <div class="bg-green-50 p-4 rounded-lg text-center">
                        <p class="text-sm text-gray-600 mb-1">Trust Score</p>
                        <p class="text-3xl font-bold text-green-600">${app.workerTrustScore || 50}/100</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-lg text-center">
                        <p class="text-sm text-gray-600 mb-1">Experience</p>
                        <p class="text-xl font-semibold text-gray-800">${app.workerExperience}</p>
                    </div>
                </div>
                
                <div class="mb-6">
                    <h4 class="font-semibold text-gray-800 mb-3">Skills</h4>
                    <div class="flex flex-wrap gap-2">
                        ${app.workerSkills && app.workerSkills.length > 0 ? 
                            app.workerSkills.map(skill => 
                                `<span class="px-3 py-2 bg-blue-100 text-blue-700 rounded-lg font-medium">${skill}</span>`
                            ).join('') : 
                            '<span class="text-gray-500">No skills listed</span>'
                        }
                    </div>
                </div>
                
                ${app.message ? `
                <div class="mb-6">
                    <h4 class="font-semibold text-gray-800 mb-3">Application Message</h4>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <p class="text-gray-700">${app.message}</p>
                    </div>
                </div>
                ` : ''}
                
                <div class="mb-6">
                    <h4 class="font-semibold text-gray-800 mb-3">Contact Information</h4>
                    <p class="text-gray-700">Email: ${app.workerEmail || 'Not provided'}</p>
                    <p class="text-sm text-gray-600 mt-2">Applied on: ${new Date(app.appliedAt).toLocaleDateString()}</p>
                </div>
                
                ${app.status === 'pending' ? `
                <div class="flex space-x-3">
                    <button 
                        onclick="acceptWorker('${app.id}'); closeWorkerModal();"
                        class="flex-1 bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-semibold"
                    >
                        <i class="fas fa-check-circle mr-2"></i>Accept Worker
                    </button>
                    <button 
                        onclick="rejectWorker('${app.id}'); closeWorkerModal();"
                        class="flex-1 bg-red-600 text-white py-3 rounded-lg hover:bg-red-700 transition font-semibold"
                    >
                        <i class="fas fa-times-circle mr-2"></i>Reject
                    </button>
                </div>
                ` : ''}
            `;
            
            modal.classList.remove('hidden');
        }
        
        window.closeWorkerModal = function() {
            document.getElementById('worker-modal').classList.add('hidden');
        }
    </script>

</body>
</html>
