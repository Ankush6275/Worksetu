<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - WorkSetu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-8 max-w-md w-full border border-white/20">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="bg-white/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                <i class="fas fa-shield-alt text-white text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Admin Login</h1>
            <p class="text-white/80">WorkSetu Platform Administration</p>
        </div>

        <!-- Warning -->
        <div class="bg-yellow-500/20 border border-yellow-500/50 rounded-lg p-4 mb-6">
            <div class="flex items-start">
                <i class="fas fa-exclamation-triangle text-yellow-300 mt-1 mr-3"></i>
                <div>
                    <h3 class="font-semibold text-yellow-300 mb-1">Authorized Access Only</h3>
                    <p class="text-sm text-yellow-200">This login is restricted to administrators only.</p>
                </div>
            </div>
        </div>

        <!-- Login Form -->
        <form id="admin-login-form" class="space-y-6">
            <!-- Email -->
            <div>
                <label class="block text-white/90 mb-2 font-medium">
                    <i class="fas fa-envelope mr-2"></i>Admin Email
                </label>
                <input 
                    type="email" 
                    id="admin-email" 
                    placeholder="admin@worksetu.com"
                    class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 text-white placeholder-white/50 backdrop-blur-sm"
                    required
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-white/90 mb-2 font-medium">
                    <i class="fas fa-lock mr-2"></i>Admin Password
                </label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="admin-password" 
                        placeholder="Enter admin password"
                        class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 text-white placeholder-white/50 backdrop-blur-sm"
                        required
                    >
                    <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/50 hover:text-white">
                        <i class="fas fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-3 px-4 rounded-lg font-semibold hover:from-indigo-600 hover:to-purple-700 transition shadow-lg transform hover:scale-105"
            >
                <i class="fas fa-sign-in-alt mr-2"></i>Login as Admin
            </button>
        </form>

        <!-- Back Link -->
        <div class="mt-6 text-center">
            <a href="../index.html" class="text-white/70 hover:text-white transition text-sm">
                <i class="fas fa-arrow-left mr-2"></i>Back to Home
            </a>
        </div>

        <!-- Info -->
        <div class="mt-8 pt-6 border-t border-white/20">
            <p class="text-white/60 text-xs text-center">
                <i class="fas fa-info-circle mr-1"></i>
                Only authorized administrators can access this portal.
            </p>
        </div>
    </div>

    <script type="module">
        import { loginUser, getUserData } from '../js/auth.js';
        
        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('admin-password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });
        
        // Admin login form submission
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value;
            
            // Validate
            if (!email || !email.includes('@')) {
                alert('❌ Please enter a valid admin email address');
                return;
            }
            
            if (!password || password.length < 6) {
                alert('❌ Please enter a valid password (minimum 6 characters)');
                return;
            }
            
            // Show loading
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Verifying...';
            submitBtn.disabled = true;
            
            try {
                // Login with Firebase
                const result = await loginUser(email, password);
                
                if (!result.success) {
                    alert('❌ Login failed: ' + result.error);
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    return;
                }
                
                // Check if user document exists
                let userData = result.userData;
                
                // If user data not found, create document
                if (!userData || Object.keys(userData).length === 0) {
                    alert('Creating admin profile...');
                    
                    // Import necessary functions
                    const { db, doc, setDoc } = await import('../js/firebase-config.js');
                    
                    // Create admin user document
                    const userRef = doc(db, 'users', result.user.uid);
                    const adminData = {
                        uid: result.user.uid,
                        email: email,
                        fullName: 'Administrator',
                        userType: 'admin',
                        isAdmin: true,
                        trustScore: 100,
                        isActive: true,
                        createdAt: new Date().toISOString()
                    };
                    
                    await setDoc(userRef, adminData);
                    userData = adminData;
                    
                    alert('✅ Admin profile created successfully!');
                }
                
                // Check if user is admin
                if (!userData.isAdmin) {
                    alert('⛔ Access Denied!\n\nYou do not have administrator privileges.\n\nThis login is for administrators only.');
                    
                    // Logout non-admin user
                    const { logoutUser } = await import('../js/auth.js');
                    await logoutUser();
                    
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    return;
                }
                
                // Success - Admin verified
                alert('✅ Admin login successful!\n\nWelcome, ' + (userData.fullName || 'Administrator'));
                
                // Redirect to admin dashboard
                window.location.href = 'admin-dashboard.html';
                
            } catch (error) {
                console.error('Login error:', error);
                alert('❌ An error occurred during login. Please try again.');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
        
        // Prevent right-click (optional security)
        document.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>

</body>
</html>
