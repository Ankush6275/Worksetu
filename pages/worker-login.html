<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Login - WorkSetu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-green-50 to-green-100 min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="bg-green-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-hard-hat text-green-600 text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Worker Login</h1>
            <p class="text-gray-600">Find jobs near you</p>
        </div>

        <!-- Info Box -->
        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
            <div class="flex items-start">
                <i class="fas fa-info-circle text-blue-500 mt-1 mr-3"></i>
                <div>
                    <p class="text-sm text-blue-800">
                        This login is for <strong>Workers</strong> only.
                        Employers should use the employer login.
                    </p>
                </div>
            </div>
        </div>

        <!-- Login Form -->
        <form id="worker-login-form" class="space-y-4">
            <!-- Email -->
            <div>
                <label class="block text-gray-700 mb-2 font-medium">
                    <i class="fas fa-envelope mr-2"></i>Email Address
                </label>
                <input 
                    type="email" 
                    id="worker-email" 
                    placeholder="Enter your email"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                    required
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-700 mb-2 font-medium">
                    <i class="fas fa-lock mr-2"></i>Password
                </label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="worker-password" 
                        placeholder="Enter your password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                        required
                    >
                    <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                        <i class="fas fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button 
                type="submit" 
                class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-3 px-4 rounded-lg font-semibold hover:from-green-600 hover:to-green-700 transition shadow-lg"
            >
                <i class="fas fa-sign-in-alt mr-2"></i>Login as Worker
            </button>
        </form>

        <!-- Links -->
        <div class="mt-6 text-center space-y-2">
            <p class="text-gray-600 text-sm">
                Don't have an account? 
                <a href="register.html" class="text-green-600 font-semibold hover:underline">Register</a>
            </p>
            <p class="text-gray-600 text-sm">
                Are you an employer? 
                <a href="employer-login.html" class="text-purple-600 font-semibold hover:underline">Employer Login</a>
            </p>
            <a href="../index.html" class="block text-gray-500 hover:text-gray-700 text-sm">
                <i class="fas fa-arrow-left mr-1"></i>Back to Home
            </a>
        </div>
    </div>

    <script type="module">
        import { loginUser, logoutUser } from '../js/auth.js';
        
        // Toggle password
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('worker-password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });
        
        // Worker login
        document.getElementById('worker-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('worker-email').value.trim();
            const password = document.getElementById('worker-password').value;
            
            if (!email || !email.includes('@')) {
                alert('❌ Please enter a valid email address');
                return;
            }
            
            if (!password || password.length < 6) {
                alert('❌ Password must be at least 6 characters');
                return;
            }
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Verifying...';
            submitBtn.disabled = true;
            
            try {
                const result = await loginUser(email, password);
                
                if (!result.success) {
                    alert('❌ Login failed: ' + result.error);
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    return;
                }
                
                // Check if user data exists
                if (!result.userData || Object.keys(result.userData).length === 0) {
                    alert('⚠️ Account Setup Required!\n\nPlease complete registration first.');
                    await logoutUser();
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    window.location.href = 'register.html';
                    return;
                }
                
                const userData = result.userData;
                
                // 🔐 SECURITY CHECK: Only workers allowed!
                if (userData.userType !== 'worker') {
                    alert('⛔ ACCESS DENIED!\n\nThis is the WORKER login page.\n\nYour account type: ' + userData.userType.toUpperCase() + '\n\nPlease use the correct login page for your account type.');
                    
                    // Logout the user
                    await logoutUser();
                    
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    
                    // Redirect to correct login
                    if (userData.userType === 'employer') {
                        setTimeout(() => {
                            window.location.href = 'employer-login.html';
                        }, 2000);
                    } else if (userData.isAdmin) {
                        setTimeout(() => {
                            window.location.href = 'admin-login.html';
                        }, 2000);
                    }
                    return;
                }
                
                // Success!
                alert('✅ Worker Login Successful!\n\nWelcome back, ' + userData.fullName);
                window.location.href = 'worker-dashboard.html';
                
            } catch (error) {
                console.error('Login error:', error);
                alert('❌ An error occurred. Please try again.');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
