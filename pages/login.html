<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WorkSetu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    
    <!-- Navigation -->
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <a href="../index.html" class="flex items-center space-x-2">
                    <i class="fas fa-briefcase text-blue-600 text-2xl"></i>
                    <h1 class="text-2xl font-bold text-gray-800">WorkSetu</h1>
                </a>
                <a href="../index.html" class="text-gray-600 hover:text-blue-600">
                    <i class="fas fa-home mr-2"></i>Home
                </a>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="container mx-auto px-4 py-12">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8">
            <div class="text-center mb-8">
                <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user text-blue-600 text-3xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
                <p class="text-gray-600 mt-2">Login to your account</p>
            </div>

            <!-- Email/Password Login -->
            <div id="login-step">
                <form id="login-form" class="space-y-4">
                    <!-- Email Input -->
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">
                            <i class="fas fa-envelope mr-2"></i>Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email-input" 
                            placeholder="Enter your email address" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            required
                        >
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password-input" 
                                placeholder="Enter your password" 
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                required
                            >
                            <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                                <i class="fas fa-eye" id="password-icon"></i>
                            </button>
                        </div>
                    </div>

                    <button 
                        type="submit" 
                        class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
                    >
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </button>
                </form>
            </div>

            <!-- Divider -->
            <div class="mt-8 text-center">
                <p class="text-gray-600">
                    Don't have an account? 
                    <a href="register.html" class="text-blue-600 font-semibold hover:underline">Register</a>
                </p>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script type="module">
        // Import Firebase authentication functions
        import { loginUser, redirectToDashboard } from '../js/auth.js';

        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        
        // Toggle password visibility
        const togglePassword = document.getElementById('toggle-password');
        const passwordIcon = document.getElementById('password-icon');
        
        togglePassword.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.remove('fa-eye');
                passwordIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.remove('fa-eye-slash');
                passwordIcon.classList.add('fa-eye');
            }
        });

        // Login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Validate email
            if (!email || !email.includes('@')) {
                alert('❌ Please enter a valid email address');
                return;
            }

            if (!password || password.length < 6) {
                alert('❌ Please enter a valid password (minimum 6 characters)');
                return;
            }

            // Show loading state
            const submitBtn = loginForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Logging in...';
            submitBtn.disabled = true;

            try {
                // Login with Firebase
                const result = await loginUser(email, password);
                
                if (result.success) {
                    // Check if user data exists
                    if (!result.userData || Object.keys(result.userData).length === 0) {
                        // User document missing - show error and ask to register
                        alert('⚠️ Account Setup Required!\n\nYour account exists but profile is incomplete.\nPlease complete registration first.');
                        submitBtn.innerHTML = originalText;
                        submitBtn.disabled = false;
                        
                        // Redirect to registration
                        window.location.href = 'register.html';
                        return;
                    }
                    
                    alert('✅ Login successful!\n\nWelcome back, ' + result.userData.fullName);
                    
                    // Check for redirect parameter in URL
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectTo = urlParams.get('redirect');
                    
                    if (redirectTo) {
                        // Redirect to specified page
                        window.location.href = redirectTo;
                    } else {
                        // Redirect to appropriate dashboard
                        redirectToDashboard(result.userData.userType);
                    }
                } else {
                    alert('❌ Login failed: ' + result.error);
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('❌ An error occurred during login. Please try again.');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
